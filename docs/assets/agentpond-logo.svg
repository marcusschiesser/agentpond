<svg width="720" height="180" viewBox="0 0 720 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AgentPond logo</title>
  <desc id="desc">A simple trace path over pond ripples beside the AgentPond wordmark.</desc>
  <style>
    .wordmark { fill: #0B1220; }
    .subtle { fill: #475569; }
    @media (prefers-color-scheme: dark) {
      .wordmark { fill: #E2E8F0; }
      .subtle { fill: #94A3B8; }
    }
  </style>

  <defs>
    <linearGradient id="pond-fill" x1="30" y1="40" x2="150" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ECFEFF"/>
      <stop offset="1" stop-color="#CCFBF1"/>
    </linearGradient>
    <linearGradient id="trace-fill" x1="54" y1="28" x2="140" y2="105" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <filter id="soft-shadow" x="14" y="28" width="156" height="136" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>

  <g filter="url(#soft-shadow)">
    <rect x="31" y="55" width="128" height="92" rx="30" fill="url(#pond-fill)"/>
    <rect x="31" y="55" width="128" height="92" rx="30" stroke="#0F766E" stroke-width="4"/>
  </g>

  <path d="M55 106C68 97 82 97 95 106C108 115 122 115 135 106" stroke="#0F766E" stroke-width="6" stroke-linecap="round"/>
  <path d="M55 124C68 115 82 115 95 124C108 133 122 133 135 124" stroke="#14B8A6" stroke-width="5" stroke-linecap="round" opacity="0.82"/>

  <path d="M66 74H95L124 92" stroke="#0B1220" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="66" cy="74" r="10" fill="url(#trace-fill)" stroke="#0B1220" stroke-width="4"/>
  <circle cx="95" cy="74" r="10" fill="url(#trace-fill)" stroke="#0B1220" stroke-width="4"/>
  <circle cx="124" cy="92" r="10" fill="#ECFEFF" stroke="#0F766E" stroke-width="4"/>

  <text x="200" y="99" class="wordmark" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="62" font-weight="750" letter-spacing="0" textLength="340" lengthAdjust="spacingAndGlyphs">AgentPond</text>
  <text x="200" y="130" class="subtle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="500" letter-spacing="0" textLength="340" lengthAdjust="spacingAndGlyphs">trace analytics for AI agents</text>
</svg>
