name: agentpond

services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  create-bucket:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minio minio123; do sleep 1; done;
      mc mb --ignore-existing local/agentpond;
      "

  ingest:
    build: .
    depends_on:
      - create-bucket
    environment:
      PORT: 3000
      AGENTPOND_PROJECT_ID: default-project
      LANGFUSE_PUBLIC_KEY: pk-agentpond
      LANGFUSE_SECRET_KEY: sk-agentpond
      AGENTPOND_S3_BUCKET: agentpond
      AGENTPOND_S3_ENDPOINT: http://minio:9000
      AGENTPOND_S3_FORCE_PATH_STYLE: "true"
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      AWS_REGION: us-east-1
    ports:
      - "4318:3000"

volumes:
  minio-data:
